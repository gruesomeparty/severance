name: compat

on:
  schedule:
    - cron: "0 7 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Diff upstream docs vs stored baselines
        env:
          GH_TOKEN: ${{ github.token }}
        run: bash tests/compat-canary.sh
